<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff758c;
            --secondary: #ff7eb3;
            --bg: linear-gradient(135deg, #fce4ec 0%, #ffe1e9 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1000px;
            touch-action: none; /* Prevents scrolling during interaction */
        }

        /* Animated Background Particles */
        .bg-circles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            overflow: hidden;
        }
        .circle {
            position: absolute;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: floatCircle 15s infinite ease-in-out;
        }

        /* Glass Card */
        #card {
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 30px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(214, 51, 132, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.6);
            animation: cardAppear 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
            position: relative;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: #d63384;
            margin-bottom: 15px;
        }

        p {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #555;
        }

        #btn-reveal {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 117, 140, 0.3);
            width: 100%;
            transition: transform 0.3s;
        }

        #btn-reveal:active { transform: scale(0.95); }

        /* Hidden Content */
        #secret-message {
            display: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .highlight { color: #d63384; font-weight: 600; font-size: 1.1rem; display: block; margin: 10px 0; }

        /* Animations */
        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(40px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes floatCircle {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-30px) translateX(20px); }
        }

        .sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 999;
            font-size: 14px;
            animation: fadeOut 1s forwards;
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1) translateY(0); }
            to { opacity: 0; transform: scale(1.5) translateY(-20px); }
        }
        
        .floating-emoji {
            position: fixed;
            bottom: -50px;
            animation: moveUp 5s linear forwards;
            z-index: 5;
        }

        @keyframes moveUp {
            to { transform: translateY(-110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="bg-circles" id="bgCircles"></div>

    <div id="card">
        <div id="intro">
            <h1>Hey Sis...</h1>
            <p>I built something small to tell you how much you mean to me.</p>
            <button id="btn-reveal" onclick="reveal()">Open Your Surprise 💖</button>
        </div>

        <div id="secret-message">
            <h1>Happy Birthday!</h1>
            <p>To the best sister in the world. 🌸</p>
            <p>I'm so lucky to have you. Thanks for always being there, even when I'm being a typical brother!</p>
            <p class="highlight">Enjoy your special day!</p>
            <p style="font-size: 0.8rem; margin-top: 20px;">— Made with love by your brother —</p>
        </div>
    </div>

    <script>
        // Create Background Circles
        const bg = document.getElementById('bgCircles');
        for (let i = 0; i < 10; i++) {
            const circle = document.createElement('div');
            circle.className = 'circle';
            const size = Math.random() * 80 + 40 + 'px';
            circle.style.width = size;
            circle.style.height = size;
            circle.style.left = Math.random() * 100 + 'vw';
            circle.style.top = Math.random() * 100 + 'vh';
            circle.style.animationDelay = Math.random() * 5 + 's';
            bg.appendChild(circle);
        }

        function reveal() {
            document.getElementById('intro').style.display = 'none';
            const secret = document.getElementById('secret-message');
            secret.style.display = 'block';
            setTimeout(() => secret.style.opacity = '1', 50);

            // Trigger Emoji Rain
            setInterval(spawnEmoji, 300);
        }

        function spawnEmoji() {
            const emojis = ['🌸', '💖', '✨', '🎂', '🎈'];
            const e = document.createElement('div');
            e.className = 'floating-emoji';
            e.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            e.style.left = Math.random() * 100 + 'vw';
            e.style.fontSize = Math.random() * 20 + 20 + 'px';
            document.body.appendChild(e);
            setTimeout(() => e.remove(), 5000);
        }

        // Sparkle Trail Effect
        const handleInteraction = (e) => {
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.innerHTML = '✨';
            s.style.left = x + 'px';
            s.style.top = y + 'px';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 1000);
        };

        window.addEventListener('mousemove', handleInteraction);
        window.addEventListener('touchmove', handleInteraction);
    </script>
</body>
</html>
